<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="기본 계산기 - 사칙연산 계산기">
    <meta name="keywords" content="calculator, math, calculator app">
    <title>계산기 | Calculator</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans KR', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ============================================
           버튼 상호작용 및 시각 효과
           ============================================ */
        button {
            transition: all 0.15s ease;
            user-select: none;
        }

        button:active {
            transform: scale(0.93);
        }

        /* ============================================
           디스플레이 스타일
           ============================================ */
        #current-value {
            font-family: 'Courier New', monospace;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
        }

        .small-text {
            font-size: 2.25rem;
        }

        .x-small-text {
            font-size: 1.875rem;
        }

        /* ============================================
           연산자 활성화 시각 효과
           ============================================ */
        .operator-active {
            background-color: rgb(16, 185, 129);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.5);
        }

        /* ============================================
           커스텀 스크롤바
           ============================================ */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgb(17, 24, 39);
        }

        ::-webkit-scrollbar-thumb {
            background: rgb(55, 65, 81);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgb(107, 114, 128);
        }
    </style>
</head>
<body class="bg-black text-white">
    <main class="w-full min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-sm">
            <!-- 뒤로가기 링크 -->
            <a href="index.html" class="inline-flex items-center gap-2 text-emerald-400 hover:text-emerald-300 transition mb-8">
                <i class="fas fa-arrow-left"></i>
                <span>포트폴리오로 돌아가기</span>
            </a>

            <!-- 제목 -->
            <h1 class="text-4xl font-bold mb-6 text-white">
                <i class="fas fa-calculator text-emerald-400"></i> 계산기
            </h1>

            <!-- 계산기 본체 -->
            <section id="calculator" class="bg-gray-900 rounded-2xl border border-gray-800 p-6 shadow-2xl">
                <!-- 디스플레이 -->
                <div id="display" class="bg-gray-950 rounded-lg p-4 mb-6">
                    <div id="expression" class="text-gray-400 text-sm text-right mb-2 h-6">
                        <!-- 수식 표시 -->
                    </div>
                    <div id="current-value" class="text-white text-4xl text-right font-semibold">
                        0
                    </div>
                </div>

                <!-- 키패드 -->
                <div id="keypad" class="grid grid-cols-4 gap-3">
                    <!-- 첫 번째 행: AC, +/-, %, ÷ -->
                    <button data-type="action" data-value="AC" class="bg-gray-700 hover:bg-gray-600 rounded-lg py-3 font-semibold text-base transition">AC</button>
                    <button data-type="action" data-value="toggle-sign" class="bg-gray-700 hover:bg-gray-600 rounded-lg py-3 font-semibold text-base transition">+/-</button>
                    <button data-type="action" data-value="percent" class="bg-gray-700 hover:bg-gray-600 rounded-lg py-3 font-semibold text-base transition">%</button>
                    <button data-type="operator" data-value="÷" class="bg-emerald-500 hover:bg-emerald-600 rounded-lg py-3 font-semibold text-base transition">÷</button>

                    <!-- 두 번째 행: 7, 8, 9, × -->
                    <button data-type="number" data-value="7" class="bg-gray-800 hover:bg-gray-700 rounded-lg py-3 font-semibold text-lg transition">7</button>
                    <button data-type="number" data-value="8" class="bg-gray-800 hover:bg-gray-700 rounded-lg py-3 font-semibold text-lg transition">8</button>
                    <button data-type="number" data-value="9" class="bg-gray-800 hover:bg-gray-700 rounded-lg py-3 font-semibold text-lg transition">9</button>
                    <button data-type="operator" data-value="×" class="bg-emerald-500 hover:bg-emerald-600 rounded-lg py-3 font-semibold text-base transition">×</button>

                    <!-- 세 번째 행: 4, 5, 6, - -->
                    <button data-type="number" data-value="4" class="bg-gray-800 hover:bg-gray-700 rounded-lg py-3 font-semibold text-lg transition">4</button>
                    <button data-type="number" data-value="5" class="bg-gray-800 hover:bg-gray-700 rounded-lg py-3 font-semibold text-lg transition">5</button>
                    <button data-type="number" data-value="6" class="bg-gray-800 hover:bg-gray-700 rounded-lg py-3 font-semibold text-lg transition">6</button>
                    <button data-type="operator" data-value="-" class="bg-emerald-500 hover:bg-emerald-600 rounded-lg py-3 font-semibold text-lg transition">-</button>

                    <!-- 네 번째 행: 1, 2, 3, + -->
                    <button data-type="number" data-value="1" class="bg-gray-800 hover:bg-gray-700 rounded-lg py-3 font-semibold text-lg transition">1</button>
                    <button data-type="number" data-value="2" class="bg-gray-800 hover:bg-gray-700 rounded-lg py-3 font-semibold text-lg transition">2</button>
                    <button data-type="number" data-value="3" class="bg-gray-800 hover:bg-gray-700 rounded-lg py-3 font-semibold text-lg transition">3</button>
                    <button data-type="operator" data-value="+" class="bg-emerald-500 hover:bg-emerald-600 rounded-lg py-3 font-semibold text-lg transition">+</button>

                    <!-- 다섯 번째 행: 0, ., = -->
                    <button data-type="number" data-value="0" class="col-span-2 bg-gray-800 hover:bg-gray-700 rounded-lg py-3 font-semibold text-lg transition">0</button>
                    <button data-type="decimal" data-value="." class="bg-gray-800 hover:bg-gray-700 rounded-lg py-3 font-semibold text-lg transition">.</button>
                    <button data-type="action" data-value="equals" class="bg-emerald-500 hover:bg-emerald-600 rounded-lg py-3 font-semibold text-lg transition">=</button>
                </div>
            </section>

            <!-- 하단 정보 -->
            <div class="mt-8 text-center text-gray-500 text-sm">
                <p>💡 키보드 단축키 지원: <kbd class="bg-gray-800 px-2 py-1 rounded">0-9</kbd>, <kbd class="bg-gray-800 px-2 py-1 rounded">+</kbd>, <kbd class="bg-gray-800 px-2 py-1 rounded">-</kbd>, <kbd class="bg-gray-800 px-2 py-1 rounded">*</kbd>, <kbd class="bg-gray-800 px-2 py-1 rounded">/</kbd>, <kbd class="bg-gray-800 px-2 py-1 rounded">Enter</kbd>, <kbd class="bg-gray-800 px-2 py-1 rounded">Esc</kbd></p>
            </div>
        </div>
    </main>

    <script>
        // ============================================
        // 상태 객체
        // ============================================
        const state = {
            currentValue: '0',
            previousValue: null,
            operator: null,
            waitingForOperand: false,
            expression: ''
        };

        // ============================================
        // DOM 요소
        // ============================================
        const displayValue = document.getElementById('current-value');
        const displayExpression = document.getElementById('expression');
        const keypad = document.getElementById('keypad');

        // ============================================
        // 디스플레이 업데이트
        // ============================================
        function updateDisplay() {
            displayValue.textContent = state.currentValue;
            displayExpression.textContent = state.expression;

            // 폰트 크기 자동 조정
            const len = state.currentValue.length;
            displayValue.classList.remove('small-text', 'x-small-text');
            if (len > 12) {
                displayValue.classList.add('x-small-text');
            } else if (len > 10) {
                displayValue.classList.add('small-text');
            }
        }

        // ============================================
        // 숫자 포맷팅
        // ============================================
        function formatNumber(numStr) {
            const num = parseFloat(numStr);
            if (isNaN(num)) return 'Error';

            // 정밀도 10자리 제한 및 불필요한 0 제거
            const rounded = Math.round(num * 1e10) / 1e10;
            return rounded.toString().replace(/\.?0+$/, '');
        }

        // ============================================
        // 숫자 입력 처리
        // ============================================
        function handleNumber(digit) {
            if (state.currentValue === 'Error') {
                state.currentValue = digit;
                state.waitingForOperand = false;
            } else if (state.waitingForOperand) {
                state.currentValue = digit;
                state.waitingForOperand = false;
            } else {
                state.currentValue = state.currentValue === '0' ? digit : state.currentValue + digit;
            }
            updateDisplay();
        }

        // ============================================
        // 소수점 처리
        // ============================================
        function handleDecimal() {
            if (state.currentValue === 'Error') return;
            if (state.waitingForOperand) {
                state.currentValue = '0.';
                state.waitingForOperand = false;
            } else if (!state.currentValue.includes('.')) {
                state.currentValue += '.';
            }
            updateDisplay();
        }

        // ============================================
        // 연산자 버튼 강조 처리
        // ============================================
        function highlightOperator(op) {
            clearOperatorHighlight();
            const buttons = Array.from(keypad.querySelectorAll('button[data-type="operator"]'));
            const operatorMap = { '+': '+', '-': '-', '×': '*', '÷': '/' };
            const targetOp = Object.keys(operatorMap).find(key => operatorMap[key] === op || key === op);

            const btn = buttons.find(b => b.textContent.trim() === targetOp);
            if (btn) btn.classList.add('operator-active');
        }

        function clearOperatorHighlight() {
            keypad.querySelectorAll('.operator-active').forEach(btn => {
                btn.classList.remove('operator-active');
            });
        }

        // ============================================
        // TODO(human): handleOperator - 연산자 처리
        // ============================================
        function handleOperator(newOperator) {
            // TODO(human): 연산자 버튼 처리 로직 구현
            // 힌트:
            // 1. previousValue 있고 waitingForOperand가 false → 먼저 calculate() 호출 (연속 연산)
            // 2. state.previousValue = state.currentValue 저장
            // 3. state.operator = newOperator
            // 4. state.waitingForOperand = true
            // 5. expression 업데이트 → updateDisplay()
            // 6. highlightOperator(newOperator) 호출
        }

        // ============================================
        // TODO(human): calculate - 실제 연산 수행
        // ============================================
        function calculate() {
            // TODO(human): 실제 연산 수행 및 = 처리 로직 구현
            // 힌트:
            // 1. previousValue / operator 없으면 return
            // 2. parseFloat으로 두 값 변환
            // 3. switch/if로 사칙연산 수행
            //    - '+': prev + current
            //    - '-': prev - current
            //    - '×' 또는 '*': prev * current
            //    - '÷' 또는 '/': current === '0' ? 'Error' : prev / current
            // 4. 결과를 currentValue에 String으로 저장 (formatNumber 사용)
            // 5. previousValue = null, operator = null, waitingForOperand = true
            // 6. expression 업데이트 → updateDisplay()
        }

        // ============================================
        // 액션 처리 (AC, +/-, %)
        // ============================================
        function handleAction(action) {
            switch (action) {
                case 'AC':
                    state.currentValue = '0';
                    state.previousValue = null;
                    state.operator = null;
                    state.waitingForOperand = false;
                    state.expression = '';
                    clearOperatorHighlight();
                    break;

                case 'toggle-sign':
                    if (state.currentValue !== 'Error') {
                        const num = parseFloat(state.currentValue);
                        state.currentValue = formatNumber((num * -1).toString());
                    }
                    break;

                case 'percent':
                    if (state.currentValue !== 'Error') {
                        const num = parseFloat(state.currentValue);
                        state.currentValue = formatNumber((num / 100).toString());
                    }
                    break;

                case 'equals':
                    if (state.operator && state.previousValue !== null) {
                        calculate();
                        clearOperatorHighlight();
                    }
                    break;
            }
            updateDisplay();
        }

        // ============================================
        // 이벤트 위임 (키패드)
        // ============================================
        keypad.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;

            const type = btn.dataset.type;
            const value = btn.dataset.value;

            if (state.currentValue === 'Error' && type !== 'action') {
                return;
            }

            if (type === 'number') {
                handleNumber(value);
            } else if (type === 'decimal') {
                handleDecimal();
            } else if (type === 'operator') {
                handleOperator(value);
            } else if (type === 'action') {
                handleAction(value);
            }
        });

        // ============================================
        // 키보드 지원
        // ============================================
        document.addEventListener('keydown', (e) => {
            const key = e.key;

            if (/[0-9]/.test(key)) {
                e.preventDefault();
                handleNumber(key);
            } else if (key === '.') {
                e.preventDefault();
                handleDecimal();
            } else if (key === '+' || key === '-') {
                e.preventDefault();
                handleOperator(key);
            } else if (key === '*') {
                e.preventDefault();
                handleOperator('×');
            } else if (key === '/') {
                e.preventDefault();
                handleOperator('÷');
            } else if (key === 'Enter') {
                e.preventDefault();
                handleAction('equals');
            } else if (key === 'Escape') {
                e.preventDefault();
                handleAction('AC');
            } else if (key === 'Backspace') {
                e.preventDefault();
                if (state.currentValue.length > 1 && !state.waitingForOperand) {
                    state.currentValue = state.currentValue.slice(0, -1);
                } else if (state.currentValue.length === 1 || state.waitingForOperand) {
                    state.currentValue = '0';
                    state.waitingForOperand = false;
                }
                updateDisplay();
            }
        });

        // ============================================
        // 초기 디스플레이 렌더링
        // ============================================
        updateDisplay();
    </script>
</body>
</html>
